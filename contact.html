<html>

    <style>
        body {

            font-family: Arial;

            margin: 0;

        }

        nav {

            background: #333;

            padding: 10px;

    <nav>

    <section>

            <input type="text" placeholder="Your Name" required><br>

            document.getElementById("msg").innerHTML
